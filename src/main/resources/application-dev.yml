spring:
  config:
    activate:
      on-profile: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bouquet
    username: bouquet
    password: "like_Lion-bouQuet6^"
    data:
      web:
        pageable:
          one-indexed-parameters:
            true
    jpa:
      properties:
        hibernate:
          ddl-auto: create
          show-sql: true
          format_sql: false
          highlight_sql: true
          open-in-view: false
          default_batch_fetch_size: 100

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace

swagger:
  server-url: http://localhost:8080
  description: "멋쟁이사자처럼 대학 13기 금오공대 교내 해커톤 4팀 API"

springdoc:
  packagesToScan: kr.ac.kumoh.likelion.bouquet
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  swagger-ui:
    path: /docs
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: alpha
  api-docs:
    groups:
      enabled: false
