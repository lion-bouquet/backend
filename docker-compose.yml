services:
  mariadb:
    container_name: mysql
    image: mysql:8
    ports:
      - 3310:3306
    environment:
      MYSQL_DATABASE: bouquet
      MYSQL_ROOT_PASSWORD: "like_Lion-bouQuet6^"
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Seoul
    volumes:
      - ./docker-infra/mysql/data:/var/lib/mysql
      - ./docker-infra/mysql/config:/etc/mysql/conf.d
